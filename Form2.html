<html>
  <head><title>form2</title>
  <style>
    .button{
      font-size:25px;
      background-color:yellow;
      font-color:green;
      border-radius:10px;
    }
    .div{
      background-color:cyan;
      border:5px;
      font-size:35px;
    }
  </style></head>
  <body style="background-color:tomato;">
   <center> <div>
      <form>
    <h2> Personal Information Site</h2>
        <label>First name</label>
        <input type="text"required placeholder="Sponge">
        <label>Last name</label>
        <input type="text" required placeholder="bob">
        <label>Password</label>
        <input type="password">
        <label>DOB</label>
        <input type="date">
        <label>Email</label>
        <input type="email" placeholder="abc@gmail.com">
        <label>Gender</label>
        <input type="radio"value="Male" name="g1" checked>Male
        <input type="radio" value="Female" name="g1">Female 
        <label>Age</label>
        <input type="number" placeholder="eg-18">
        <label for="phone">phone number</label>
        <input type="tel" id="phone" placeholder="+91-12345-67890" pattern="[0-9]{2}-[0-9]{5}-[0-9]{5}">
        <label for="qualification">Qualification</label>
        <select id="qualification">
          <option value="10thpass">10th pass</option>
          <option value="12thpass">12th pass</option>
          <option value="undergraduate">Undergraduate</option>
        </select>
        <label>Hobbies </label>
        <input type="checkbox">Playing
        <input type="checkbox">Dancing
        <input type="checkbox">Singing
        <input type="checkbox">others
        
        <button>Finish</button>
    </form>
    </div></center>
    <a href="">List of courses offered by college</a>
  </body>
</html>
